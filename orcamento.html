<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pousada dos Sonhos - Gerador</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #eef5f0;
            padding: 10px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            padding: 18px 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 1.6rem;
            color: #0b5e42;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.2rem;
            border-left: 4px solid #0b5e42;
            padding-left: 10px;
            margin: 20px 0 12px 0;
        }

        /* GRID FORÇADO: 2 colunas em qualquer tela menor que 800px */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Em telas muito pequenas (abaixo de 400px), mantém 2 colunas mas reduz padding */
        @media (max-width: 400px) {
            .form-grid {
                gap: 8px;
            }
            .field-group input {
                font-size: 14px;
                padding: 8px;
            }
        }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c5a4a;
            margin-bottom: 3px;
        }

        input, textarea, select {
            border: 1px solid #cbd5e0;
            border-radius: 14px;
            padding: 10px 10px;
            font-size: 0.9rem;
            font-family: inherit;
            background: white;
        }
        
        textarea, select {
            width: 100%;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #0b5e42;
            box-shadow: 0 0 0 2px rgba(11,94,66,0.2);
        }

        /* Cards das suítes */
        .suites-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 16px 0;
        }

        .suite-card {
            background: #fefaf0;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 14px;
        }

        .suite-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .suite-name {
            font-weight: bold;
            font-size: 1rem;
            color: #0b5e42;
        }

        .suite-desc textarea {
            min-height: 70px;
            resize: vertical;
            font-size: 0.8rem;
        }

        .suite-price {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .suite-price label {
            font-size: 0.75rem;
        }

        .price-input {
            flex: 1;
            min-width: 100px;
        }

        /* Opções */
        .options-bar {
            background: #f0f6f2;
            border-radius: 24px;
            padding: 12px;
            margin: 16px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .warning {
            background: #fff3cd;
            border-left: 5px solid #f0ad4e;
            padding: 10px;
            border-radius: 14px;
            margin: 12px 0;
            font-size: 0.8rem;
        }

        .message-area {
            background: #f1f9f4;
            border-radius: 20px;
            padding: 14px;
            margin-top: 20px;
        }

        .message-area textarea {
            height: 420px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.4;
        }

        button {
            background: #25D366;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 40px;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #6c757d;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏨 Pousada dos Sonhos<br><span style="font-size:0.9rem;">🌊 Costa Azul</span></h1>
    <p style="font-size:0.8rem;">Dados salvos automaticamente. Edite descrições e preços.</p>

    <!-- Campos lado a lado: 2 colunas fixas -->
    <div class="form-grid">
        <div class="field-group"><label>📅 Check-in</label><input type="date" id="checkin" value="2026-06-09"></div>
        <div class="field-group"><label>📅 Check-out</label><input type="date" id="checkout" value="2026-06-10"></div>
        <div class="field-group"><label>👤 Adultos</label><input type="number" id="adultos" min="1" value="2"></div>
        <div class="field-group"><label>🧒 Crianças</label><input type="number" id="criancas" min="0" value="0"></div>
        <div class="field-group"><label>🍼 Bebês</label><input type="number" id="bebes" min="0" value="0"></div>
        <div class="field-group"><label>🐾 Pets</label><input type="number" id="pets" min="0" value="0"></div>
    </div>

    <h2>🏡 Suítes – edite descrição e valor</h2>
    <div id="suites-container" class="suites-container"></div>

    <div class="options-bar">
        <div class="option-item"><input type="checkbox" id="aplicar-desconto"> <strong>Desconto</strong> <input type="number" id="desconto-percent" value="12" step="1" style="width:60px;"> %</div>
        <div class="option-item"><input type="checkbox" id="incluir-link"> 🔗 Link do Airbnb</div>
    </div>

    <div id="warning-message" class="warning" style="display: none;"></div>

    <button id="copiar-btn">📋 Copiar mensagem</button>

    <div class="message-area">
        <label style="font-weight: bold;">📝 Mensagem gerada</label>
        <textarea id="mensagem-texto" readonly></textarea>
    </div>
    <footer>Layout otimizado para celular (2 colunas). Dados salvos no navegador.</footer>
</div>

<script>
    // Dados base das suítes (mesmo conteúdo)
    const ROOMS_BASE = {
        "1503584633402633674": { name: "Suíte Costa Azul", originalDescription: "tem uma varanda excepcional com vista mar, somada com uma rede para relaxar em uma vista maravilhosa do mar, que dá para ser apreciado deitado na cama. O quarto conta com frigobar, cafeteira, tv, e ar-condicionado. Este quarto possui uma cama de casal. (Não tem piscina). possibilitando 2 pessoas.", defaultPrice: 208 },
        "1535677362018464574": { name: "Suíte Praia da Tartaruga", originalDescription: "preparada para descansar, tendo um ambiente mais silencioso. Conta com uma cama de casal, e uma beliche com duas camas de solteiro, ventilador, cafeteira, tv e frigobar. (Não tem piscina, nem ar-condicionado). possibilitando 4 pessoas.", defaultPrice: 163 },
        "1507145359441207299": { name: "Suíte Praia da Baleia", originalDescription: "dispõe de varanda com vista mar, piscina de borda infinita, churrasqueira, frigobar, cafeteira, ventilador, tv, mesa externa, e tudo isso privativo no quarto, somente vocês irão utilizar. Este quarto conta com 1 cama de casal e duas camas de solteiro. (Não tem ar-condicionado). possibilitando 4 pessoas.", defaultPrice: 268 }
    };
    const LISTING_ID = "1503584633402633674";
    const AIRBNB_BASE = "https://www.airbnb.com.br/rooms/";

    // DOM elements
    const checkinEl = document.getElementById('checkin');
    const checkoutEl = document.getElementById('checkout');
    const adultosEl = document.getElementById('adultos');
    const criancasEl = document.getElementById('criancas');
    const bebesEl = document.getElementById('bebes');
    const petsEl = document.getElementById('pets');
    const aplicarDescontoCheck = document.getElementById('aplicar-desconto');
    const descontoPercentEl = document.getElementById('desconto-percent');
    const incluirLinkCheck = document.getElementById('incluir-link');
    const warningDiv = document.getElementById('warning-message');
    const mensagemTextarea = document.getElementById('mensagem-texto');
    const copiarBtn = document.getElementById('copiar-btn');
    const suitesContainer = document.getElementById('suites-container');

    let suitesData = [];

    // Carregar / salvar
    function loadFromStorage() {
        const saved = localStorage.getItem('pousadaUserData');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.checkin) checkinEl.value = data.checkin;
                if (data.checkout) checkoutEl.value = data.checkout;
                if (data.adultos) adultosEl.value = data.adultos;
                if (data.criancas) criancasEl.value = data.criancas;
                if (data.bebes) bebesEl.value = data.bebes;
                if (data.pets) petsEl.value = data.pets;
                if (typeof data.aplicarDesconto === 'boolean') aplicarDescontoCheck.checked = data.aplicarDesconto;
                if (data.descontoPercent) descontoPercentEl.value = data.descontoPercent;
                if (typeof data.incluirLink === 'boolean') incluirLinkCheck.checked = data.incluirLink;
                if (data.suites && Array.isArray(data.suites)) suitesData = data.suites;
                else initSuitesData();
            } catch(e) { initSuitesData(); }
        } else {
            initSuitesData();
        }
        // garantir consistência
        for (let id in ROOMS_BASE) {
            if (!suitesData.find(s => s.id === id)) {
                suitesData.push({ id, name: ROOMS_BASE[id].name, description: ROOMS_BASE[id].originalDescription, price: ROOMS_BASE[id].defaultPrice, checked: true });
            }
        }
        suitesData = suitesData.filter(s => ROOMS_BASE[s.id]);
        renderSuites();
    }

    function initSuitesData() {
        suitesData = Object.keys(ROOMS_BASE).map(id => ({
            id, name: ROOMS_BASE[id].name, description: ROOMS_BASE[id].originalDescription, price: ROOMS_BASE[id].defaultPrice, checked: true
        }));
    }

    function renderSuites() {
        suitesContainer.innerHTML = '';
        suitesData.forEach((suite, idx) => {
            const card = document.createElement('div');
            card.className = 'suite-card';
            card.innerHTML = `
                <div class="suite-header">
                    <input type="checkbox" class="suite-chk" data-idx="${idx}" ${suite.checked ? 'checked' : ''}>
                    <span class="suite-name">${escapeHtml(suite.name)}</span>
                </div>
                <div class="suite-desc">
                    <textarea class="suite-desc-text" data-idx="${idx}" rows="2">${escapeHtml(suite.description)}</textarea>
                </div>
                <div class="suite-price">
                    <label>💰 Preço (R$):</label>
                    <input type="number" class="suite-price-input price-input" data-idx="${idx}" value="${suite.price}" step="1">
                </div>
            `;
            suitesContainer.appendChild(card);
        });
        // eventos
        document.querySelectorAll('.suite-chk').forEach(chk => chk.addEventListener('change', (e) => { suitesData[e.target.dataset.idx].checked = e.target.checked; saveAndUpdate(); }));
        document.querySelectorAll('.suite-desc-text').forEach(ta => ta.addEventListener('input', (e) => { suitesData[e.target.dataset.idx].description = e.target.value; saveAndUpdate(); }));
        document.querySelectorAll('.suite-price-input').forEach(inp => inp.addEventListener('input', (e) => { let val = parseFloat(e.target.value); if (!isNaN(val)) suitesData[e.target.dataset.idx].price = val; saveAndUpdate(); }));
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    function saveToStorage() {
        localStorage.setItem('pousadaUserData', JSON.stringify({
            checkin: checkinEl.value, checkout: checkoutEl.value, adultos: adultosEl.value, criancas: criancasEl.value, bebes: bebesEl.value, pets: petsEl.value,
            aplicarDesconto: aplicarDescontoCheck.checked, descontoPercent: descontoPercentEl.value, incluirLink: incluirLinkCheck.checked, suites: suitesData
        }));
    }

    function formatBRL(v) { return v.toLocaleString('pt-BR', {minimumFractionDigits:2}); }

    function buildAirbnbUrl(roomId, checkin, checkout, adultos, criancas, bebes) {
        const guests = adultos + criancas;
        return `${AIRBNB_BASE}${LISTING_ID}/room-details?guests=${guests}&adults=${adultos}&children=${criancas}&infants=${bebes}&check_in=${checkin}&check_out=${checkout}&room_id=${roomId}&room_origin=room_section&s=67`;
    }

    function generateMessage() {
        let checkin = checkinEl.value, checkout = checkoutEl.value;
        if (!checkin || !checkout) return "Preencha as datas.";
        const adultos = parseInt(adultosEl.value)||1, criancas = parseInt(criancasEl.value)||0, bebes = parseInt(bebesEl.value)||0, pets = parseInt(petsEl.value)||0;
        const checkinDate = new Date(checkin), checkoutDate = new Date(checkout);
        const noites = (checkoutDate - checkinDate) / (1000*3600*24);
        if (noites <= 0) return "Check-out após check-in.";
        const isWeekend = (checkinDate.getDay() === 5 || checkinDate.getDay() === 6);
        if (isWeekend && noites < 2) warningDiv.style.display = 'block', warningDiv.textContent = "⚠️ Mínimo 2 noites em fins de semana.";
        else warningDiv.style.display = 'none';
        const aplicarDesconto = aplicarDescontoCheck.checked;
        let descontoPercent = aplicarDesconto ? parseFloat(descontoPercentEl.value)||0 : 0;
        const incluirLink = incluirLinkCheck.checked;
        const formatDate = d => new Date(d+"T00:00:00").toLocaleDateString('pt-BR');
        let msg = `🏨 *POUSADA DOS SONHOS*\n🌊*COSTA AZUL*\n\n📅 *PERÍODO:*\n• Check-in: ${formatDate(checkin)} (14h)\n• Check-out: ${formatDate(checkout)} (11h)\n• Total de noites: ${noites} noites\n${isWeekend && noites<2 ? '⚠️ *Política: mínimo 2 noites para fins de semana*\n' : ''}\n👥 *HÓSPEDES:*${adultos>0?`\n• Adultos: ${adultos}`:''}${criancas>0?`\n• Crianças: ${criancas}`:''}${bebes>0?`\n• Bebês: ${bebes}`:''}${pets>0?`\n• Pets: ${pets}`:''}\n------------------------\n`;
        let hasRoom = false;
        for (const suite of suitesData) {
            if (!suite.checked || suite.price <= 0) continue;
            hasRoom = true;
            const original = suite.price;
            const comDesc = original * (1 - descontoPercent/100);
            msg += `\n*${suite.name}*\n${suite.description}\n`;
            if (aplicarDesconto) msg += `\n💰 *PREÇOS:*\n• Original R$ ${formatBRL(original)}\n• Com ${descontoPercent}% desconto R$ ${formatBRL(comDesc)} para pagamento 100% no ato\n`;
            else msg += `\n💰 *PREÇO:*\nR$ ${formatBRL(original)}\n`;
            if (incluirLink) msg += `\n🔗 Link: ${buildAirbnbUrl(suite.id, checkin, checkout, adultos, criancas, bebes)}\n`;
            msg += `\n------------------------\n`;
        }
        if (!hasRoom) msg += "\n❌ *Nenhum quarto selecionado ou com preço válido*\n\n";
        if (aplicarDesconto) msg += `💳 *CONDIÇÕES DE PAGAMENTO:*\n• Opção 1: 50% no ato + 50% no check-in\n• Opção 2: 100% à vista com ${descontoPercent}% de desconto\n`;
        else msg += `💳 *CONDIÇÕES DE PAGAMENTO:*\n50% no ato da reserva + 50% no check-in\n`;
        msg += `\n📱 *PIX:* pousadadossonhoscostaazul@gmail.com\n\n✅ *RESERVA:*\n1. Escolha a suíte.\n2. ` + (aplicarDesconto ? "Faça o pagamento de 50% ou 100% com desconto." : "Faça o pagamento da entrada de 50%.") + `\n3. Envie comprovante.\n4. Informe dados dos hóspedes.\n5. Receba confirmação.\n\n❌ *Cancelamento:* Grátis até 14 dias antes. Após, sem reembolso.\n\nEquipe Pousada dos Sonhos ✨`;
        return msg;
    }

    function updateMessage() { mensagemTextarea.value = generateMessage(); }
    function saveAndUpdate() { saveToStorage(); updateMessage(); }

    function bindEvents() {
        [checkinEl, checkoutEl, adultosEl, criancasEl, bebesEl, petsEl, aplicarDescontoCheck, descontoPercentEl, incluirLinkCheck].forEach(el => el.addEventListener('input', saveAndUpdate));
        copiarBtn.addEventListener('click', () => { mensagemTextarea.select(); document.execCommand('copy'); alert('Mensagem copiada!'); });
    }

    loadFromStorage();
    bindEvents();
    updateMessage();
</script>
</body>
</html>
