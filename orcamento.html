<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pousada dos Sonhos - Gerador de Mensagem</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, Helvetica, sans-serif;
            background: #eef5f0;
            padding: 12px;
            color: #1e2a2e;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            padding: 18px 16px;
        }

        h1 {
            font-size: 1.6rem;
            color: #0b5e42;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        h2 {
            font-size: 1.25rem;
            border-left: 5px solid #0b5e42;
            padding-left: 12px;
            margin: 20px 0 12px 0;
            color: #1e3a2f;
        }

        /* Grid responsivo: duas colunas em mobile, quebra automática */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Para telas muito pequenas, força uma coluna (mas ainda respeita min-width) */
        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr 1fr; /* duas colunas fixas */
            }
            /* Se algum campo precisar de largura total, pode usar :first-child ou ajuste manual */
            .field-group:first-child,
            .field-group:nth-child(2) {
                /* ambos já ocupam 1fr cada */
            }
        }

        /* Para telas abaixo de 380px, vira uma coluna */
        @media (max-width: 380px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 4px;
            color: #2c5a4a;
        }

        input, select, textarea {
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 16px;
            font-size: 0.9rem;
            font-family: inherit;
            background: white;
            transition: 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0b5e42;
            box-shadow: 0 0 0 3px rgba(11,94,66,0.15);
        }

        /* Cards de suítes */
        .suites-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 16px 0;
        }

        .suite-card {
            background: #fefaf0;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            padding: 16px;
            transition: all 0.2s;
        }

        .suite-header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .suite-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0b5e42;
        }

        .suite-checkbox {
            transform: scale(1.1);
            margin-right: 4px;
        }

        .suite-desc {
            margin: 12px 0;
        }

        .suite-desc textarea {
            width: 100%;
            min-height: 80px;
            resize: vertical;
            font-size: 0.85rem;
            background: white;
        }

        .suite-price {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .suite-price label {
            margin-bottom: 0;
        }

        .price-input {
            width: 140px;
            flex: 1;
            min-width: 100px;
        }

        /* Opções bar */
        .options-bar {
            background: #f0f6f2;
            border-radius: 28px;
            padding: 14px 16px;
            margin: 16px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .discount-field {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .discount-field input {
            width: 70px;
        }

        .warning {
            background: #fff3cd;
            border-left: 6px solid #f0ad4e;
            padding: 12px 16px;
            border-radius: 20px;
            margin: 16px 0;
            font-size: 0.85rem;
        }

        .message-area {
            background: #f1f9f4;
            border-radius: 24px;
            padding: 18px;
            margin-top: 20px;
            border: 1px solid #c8e6d9;
        }

        .message-area textarea {
            width: 100%;
            height: 460px;
            font-family: 'Courier New', 'Segoe UI', monospace;
            font-size: 13px;
            line-height: 1.5;
            background: white;
            resize: vertical;
        }

        button {
            background: #25D366;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #128C7E;
            transform: scale(1.01);
        }

        .flex-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 24px;
        }

        hr {
            margin: 18px 0;
            border-color: #c8e6d9;
        }

        /* Ajustes específicos mobile para cards */
        @media (max-width: 600px) {
            .suite-price {
                flex-direction: column;
                align-items: flex-start;
            }
            .price-input {
                width: 100%;
            }
            .suite-header {
                flex-direction: row;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏨 Pousada dos Sonhos<br><span style="font-size:0.9rem;">🌊 Costa Azul</span></h1>
    <p style="font-size:0.85rem;">Dados salvos automaticamente. Edite descrições e preços.</p>

    <!-- Dados principais: grid responsivo lado a lado -->
    <div class="form-grid">
        <div class="field-group"><label>📅 Check-in</label><input type="date" id="checkin" value="2026-06-09"></div>
        <div class="field-group"><label>📅 Check-out</label><input type="date" id="checkout" value="2026-06-10"></div>
        <div class="field-group"><label>👤 Adultos</label><input type="number" id="adultos" min="1" value="2"></div>
        <div class="field-group"><label>🧒 Crianças</label><input type="number" id="criancas" min="0" value="0"></div>
        <div class="field-group"><label>🍼 Bebês</label><input type="number" id="bebes" min="0" value="0"></div>
        <div class="field-group"><label>🐾 Pets</label><input type="number" id="pets" min="0" value="0"></div>
    </div>

    <h2>🏡 Suítes – edite descrição e valor</h2>
    <div id="suites-container" class="suites-container"></div>

    <!-- Opções globais -->
    <div class="options-bar">
        <div class="option-item"><input type="checkbox" id="aplicar-desconto"> <strong>Aplicar desconto</strong>
            <div id="desconto-wrapper" style="display:inline-flex; margin-left: 4px;">
                <input type="number" id="desconto-percent" value="12" step="1" min="0" max="100" style="width:70px;"> %
            </div>
        </div>
        <div class="option-item"><input type="checkbox" id="incluir-link"> 🔗 Incluir link do Airbnb</div>
    </div>

    <div id="warning-message" class="warning" style="display: none;"></div>

    <div class="flex-buttons">
        <button id="copiar-btn">📋 Copiar mensagem</button>
    </div>

    <div class="message-area">
        <label style="font-weight: bold;">📝 Mensagem gerada (copie e cole no WhatsApp)</label>
        <textarea id="mensagem-texto" readonly></textarea>
    </div>
    <footer>Os dados são salvos automaticamente no seu navegador. Deslize para ver todas as opções.</footer>
</div>

<script>
    // Dados base das suítes
    const ROOMS_BASE = {
        "1503584633402633674": {
            name: "Suíte Costa Azul",
            originalDescription: "tem uma varanda excepcional com vista mar, somada com uma rede para relaxar em uma vista maravilhosa do mar, que dá para ser apreciado deitado na cama. O quarto conta com frigobar, cafeteira, tv, e ar-condicionado. Este quarto possui uma cama de casal. (Não tem piscina). possibilitando 2 pessoas.",
            defaultPrice: 208,
            max_guests: 2
        },
        "1535677362018464574": {
            name: "Suíte Praia da Tartaruga",
            originalDescription: "preparada para descansar, tendo um ambiente mais silencioso. Conta com uma cama de casal, e uma beliche com duas camas de solteiro, ventilador, cafeteira, tv e frigobar. (Não tem piscina, nem ar-condicionado). possibilitando 4 pessoas.",
            defaultPrice: 163,
            max_guests: 4
        },
        "1507145359441207299": {
            name: "Suíte Praia da Baleia",
            originalDescription: "dispõe de varanda com vista mar, piscina de borda infinita, churrasqueira, frigobar, cafeteira, ventilador, tv, mesa externa, e tudo isso privativo no quarto, somente vocês irão utilizar. Este quarto conta com 1 cama de casal e duas camas de solteiro. (Não tem ar-condicionado). possibilitando 4 pessoas.",
            defaultPrice: 268,
            max_guests: 4
        }
    };

    const LISTING_ID = "1503584633402633674";
    const AIRBNB_BASE = "https://www.airbnb.com.br/rooms/";

    // Elementos DOM
    const checkinEl = document.getElementById('checkin');
    const checkoutEl = document.getElementById('checkout');
    const adultosEl = document.getElementById('adultos');
    const criancasEl = document.getElementById('criancas');
    const bebesEl = document.getElementById('bebes');
    const petsEl = document.getElementById('pets');
    const aplicarDescontoCheck = document.getElementById('aplicar-desconto');
    const descontoPercentEl = document.getElementById('desconto-percent');
    const incluirLinkCheck = document.getElementById('incluir-link');
    const warningDiv = document.getElementById('warning-message');
    const mensagemTextarea = document.getElementById('mensagem-texto');
    const copiarBtn = document.getElementById('copiar-btn');
    const suitesContainer = document.getElementById('suites-container');

    let suitesData = [];

    function loadFromStorage() {
        const saved = localStorage.getItem('pousadaUserData');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.checkin) checkinEl.value = data.checkin;
                if (data.checkout) checkoutEl.value = data.checkout;
                if (data.adultos) adultosEl.value = data.adultos;
                if (data.criancas) criancasEl.value = data.criancas;
                if (data.bebes) bebesEl.value = data.bebes;
                if (data.pets) petsEl.value = data.pets;
                if (typeof data.aplicarDesconto === 'boolean') aplicarDescontoCheck.checked = data.aplicarDesconto;
                if (data.descontoPercent) descontoPercentEl.value = data.descontoPercent;
                if (typeof data.incluirLink === 'boolean') incluirLinkCheck.checked = data.incluirLink;
                if (data.suites && Array.isArray(data.suites)) {
                    suitesData = data.suites;
                } else {
                    initSuitesData();
                }
            } catch(e) { initSuitesData(); }
        } else {
            initSuitesData();
        }
        // garantir consistência
        const idsFromBase = Object.keys(ROOMS_BASE);
        for (let id of idsFromBase) {
            if (!suitesData.find(s => s.id === id)) {
                suitesData.push({
                    id: id,
                    name: ROOMS_BASE[id].name,
                    description: ROOMS_BASE[id].originalDescription,
                    price: ROOMS_BASE[id].defaultPrice,
                    checked: true
                });
            }
        }
        suitesData = suitesData.filter(s => ROOMS_BASE[s.id]);
        updateUIFromSuitesData();
    }

    function initSuitesData() {
        suitesData = [];
        for (const [id, info] of Object.entries(ROOMS_BASE)) {
            suitesData.push({
                id: id,
                name: info.name,
                description: info.originalDescription,
                price: info.defaultPrice,
                checked: true
            });
        }
    }

    function updateUIFromSuitesData() {
        suitesContainer.innerHTML = '';
        suitesData.forEach((suite, idx) => {
            const card = document.createElement('div');
            card.className = 'suite-card';
            card.innerHTML = `
                <div class="suite-header">
                    <label style="display: flex; gap:8px; align-items:center;">
                        <input type="checkbox" class="suite-chk" data-idx="${idx}" ${suite.checked ? 'checked' : ''}>
                        <span class="suite-name">${escapeHtml(suite.name)}</span>
                    </label>
                </div>
                <div class="suite-desc">
                    <textarea class="suite-desc-text" data-idx="${idx}" rows="3">${escapeHtml(suite.description)}</textarea>
                </div>
                <div class="suite-price">
                    <label>💰 Preço (R$ / diária):</label>
                    <input type="number" class="suite-price-input price-input" data-idx="${idx}" value="${suite.price}" step="1" min="0">
                </div>
            `;
            suitesContainer.appendChild(card);
        });
        // eventos
        document.querySelectorAll('.suite-chk').forEach(chk => {
            chk.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                suitesData[idx].checked = e.target.checked;
                saveToStorage();
                updateMessage();
            });
        });
        document.querySelectorAll('.suite-desc-text').forEach(ta => {
            ta.addEventListener('input', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                suitesData[idx].description = e.target.value;
                saveToStorage();
                updateMessage();
            });
        });
        document.querySelectorAll('.suite-price-input').forEach(inp => {
            inp.addEventListener('input', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                let val = parseFloat(e.target.value);
                if (isNaN(val)) val = 0;
                suitesData[idx].price = val;
                saveToStorage();
                updateMessage();
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function saveToStorage() {
        const dataToSave = {
            checkin: checkinEl.value,
            checkout: checkoutEl.value,
            adultos: adultosEl.value,
            criancas: criancasEl.value,
            bebes: bebesEl.value,
            pets: petsEl.value,
            aplicarDesconto: aplicarDescontoCheck.checked,
            descontoPercent: descontoPercentEl.value,
            incluirLink: incluirLinkCheck.checked,
            suites: suitesData
        };
        localStorage.setItem('pousadaUserData', JSON.stringify(dataToSave));
    }

    function formatBRL(value) {
        return value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function buildAirbnbUrl(roomId, checkin, checkout, adultos, criancas, bebes) {
        const guests = adultos + criancas;
        const params = new URLSearchParams({
            guests: guests,
            adults: adultos,
            children: criancas,
            infants: bebes,
            check_in: checkin,
            check_out: checkout,
            room_id: roomId,
            room_origin: "room_section",
            s: "67"
        });
        return `${AIRBNB_BASE}${LISTING_ID}/room-details?${params.toString()}`;
    }

    function validateMinNights(checkinDate, noites) {
        const weekday = checkinDate.getDay();
        if ((weekday === 5 || weekday === 6) && noites < 2) {
            return { valid: false, msg: "Reservas com check-in na sexta ou sábado exigem no mínimo 2 diárias." };
        }
        return { valid: true, msg: "" };
    }

    function generateMessage() {
        let checkin = checkinEl.value;
        let checkout = checkoutEl.value;
        if (!checkin || !checkout) return "Preencha as datas de check-in e check-out.";

        const adultos = parseInt(adultosEl.value) || 1;
        const criancas = parseInt(criancasEl.value) || 0;
        const bebes = parseInt(bebesEl.value) || 0;
        const pets = parseInt(petsEl.value) || 0;

        const checkinDate = new Date(checkin);
        const checkoutDate = new Date(checkout);
        const noites = Math.round((checkoutDate - checkinDate) / (1000 * 60 * 60 * 24));
        if (noites <= 0) return "Data de check-out deve ser posterior ao check-in.";

        const val = validateMinNights(checkinDate, noites);
        if (!val.valid) {
            warningDiv.style.display = 'block';
            warningDiv.textContent = `⚠️ ${val.msg}`;
        } else {
            warningDiv.style.display = 'none';
        }

        const aplicarDesconto = aplicarDescontoCheck.checked;
        let descontoPercent = 0;
        if (aplicarDesconto) {
            descontoPercent = parseFloat(descontoPercentEl.value) || 0;
        }
        const incluirLink = incluirLinkCheck.checked;

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('pt-BR');
        }
        const checkinFmt = formatDate(checkin);
        const checkoutFmt = formatDate(checkout);
        const isWeekend = (checkinDate.getDay() === 5 || checkinDate.getDay() === 6);

        let mensagem = `🏨 *POUSADA DOS SONHOS*
🌊*COSTA AZUL*

📅 *PERÍODO:*
• Check-in: ${checkinFmt} (14h)
• Check-out: ${checkoutFmt} (11h)
• Total de noites: ${noites} noites
${isWeekend ? '⚠️ *Nossa política de reserva é de no mínimo 2 noites para fins de semana*\n' : ''}
👥 *HÓSPEDES:${adultos > 0 ? `\n• Adultos: ${adultos}` : ''}${criancas > 0 ? `\n• Crianças: ${criancas}` : ''}${bebes > 0 ? `\n• Bebês: ${bebes}` : ''}${pets > 0 ? `\n• Pets: ${pets}` : ''}
------------------------\n`;

        let quartosSelecionados = false;
        for (const suite of suitesData) {
            if (!suite.checked) continue;
            if (suite.price <= 0) continue;
            quartosSelecionados = true;
            const precoOriginal = suite.price;
            let precoComDesconto = precoOriginal;
            if (aplicarDesconto) {
                precoComDesconto = precoOriginal * (1 - descontoPercent / 100);
            }
            mensagem += `\n*${suite.name}*\n${suite.description}\n`;
            if (aplicarDesconto) {
                mensagem += `\n💰 *PREÇOS:*\n• Original R$ ${formatBRL(precoOriginal)}\n• Com ${descontoPercent}% desconto R$ ${formatBRL(precoComDesconto)} para pagamento de 100% no ato da reserva\n`;
            } else {
                mensagem += `\n💰 *PREÇO:*\nR$ ${formatBRL(precoOriginal)}\n`;
            }
            if (incluirLink) {
                const url = buildAirbnbUrl(suite.id, checkin, checkout, adultos, criancas, bebes);
                mensagem += `\n🔗 Link: ${url}\n`;
            }
            mensagem += `\n------------------------\n`;
        }

        if (!quartosSelecionados) {
            mensagem += "\n❌ *Nenhum quarto selecionado ou com preço válido*\n\n";
        }

        if (aplicarDesconto) {
            mensagem += `💳 *CONDIÇÕES DE PAGAMENTO:*\n• Opção 1: 50% no ato da reserva + 50% no check-in\n• Opção 2: 100% à vista com ${descontoPercent}% de desconto\n`;
        } else {
            mensagem += `💳 *CONDIÇÕES DE PAGAMENTO:*\n50% no ato da reserva + 50% no check-in\n`;
        }

        mensagem += `\n📱 *PIX PARA PAGAMENTO:*\npousadadossonhoscostaazul@gmail.com\n\n✅ *PARA RESERVAR:*\n1. Escolha a suíte desejada.\n`;
        if (aplicarDesconto) {
            mensagem += `2. Faça o pagamento da entrada de 50% ou o valor de 100% com desconto.`;
        } else {
            mensagem += `2. Faça o pagamento da entrada de 50%.`;
        }
        mensagem += `\n3. Envie o comprovante por este WhatsApp.\n4. Informe os dados do titular da reserva e seus acompanhantes (nome completo e documento de identificação).\n5. Receba a confirmação da reserva.\n\n❌ *Política de Cancelamento:*\n• Cancelamento grátis até 14 dias antes do check-in.\n• Após este período, não tem reembolso.\n• Não comparecimento no dia do check-in, não tem reembolso.\n\nEstamos à disposição!\nEquipe Pousada dos Sonhos ✨`;

        return mensagem;
    }

    function updateMessage() {
        mensagemTextarea.value = generateMessage();
    }

    function saveAndUpdate() {
        saveToStorage();
        updateMessage();
    }

    function bindGlobalEvents() {
        const globalFields = [checkinEl, checkoutEl, adultosEl, criancasEl, bebesEl, petsEl, aplicarDescontoCheck, descontoPercentEl, incluirLinkCheck];
        globalFields.forEach(field => {
            field.addEventListener('input', () => saveAndUpdate());
        });
        aplicarDescontoCheck.addEventListener('change', () => saveAndUpdate());
        copiarBtn.addEventListener('click', () => {
            mensagemTextarea.select();
            document.execCommand('copy');
            alert('✅ Mensagem copiada!');
        });
        function toggleDescontoWrapper() {
            const wrapper = document.getElementById('desconto-wrapper');
            if (wrapper) wrapper.style.display = aplicarDescontoCheck.checked ? 'inline-flex' : 'none';
        }
        toggleDescontoWrapper();
        aplicarDescontoCheck.addEventListener('change', toggleDescontoWrapper);
    }

    function init() {
        loadFromStorage();
        bindGlobalEvents();
        updateMessage();
    }

    init();
</script>
</body>
</html>
